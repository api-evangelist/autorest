aid: autorest
name: AutoRest
description: >-
  AutoRest is an open source tool from Microsoft (MIT License) that generates
  client libraries for accessing RESTful APIs from OpenAPI specifications. It
  powers generation of Azure SDKs across C#, Python, Java, TypeScript, Go,
  PowerShell, and Swift with an extensible plugin architecture. Note: AutoRest
  is deprecated as of 2026 with retirement on July 1, 2026. The recommended
  successor is TypeSpec, a modern API description language and code generation
  platform from Microsoft.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Code Generation
  - Microsoft
  - OpenAPI
  - SDK Generation
  - Azure SDK
  - Deprecated
url: >-
  https://raw.githubusercontent.com/api-evangelist/autorest/refs/heads/main/apis.yml
created: '2026-03-25'
modified: '2026-04-19'
