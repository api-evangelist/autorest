common:
  - type: Website
    url: https://github.com/Azure/autorest
  - type: Documentation
    url: https://github.com/Azure/autorest/blob/main/docs/readme.md
  - type: GitHubOrganization
    url: https://github.com/Azure
  - type: GitHubRepository
    url: https://github.com/Azure/autorest
  - type: GettingStarted
    url: https://github.com/Azure/autorest/blob/main/docs/install/readme.md
  - type: ReleaseNotes
    url: https://github.com/Azure/autorest/releases
  - type: Features
    data:
      - name: Multi-Language Code Generation
        description: >-
          Generate client SDKs from OpenAPI specifications in C#, Python, Java,
          TypeScript, JavaScript, Go, PowerShell, and Swift using language-specific
          generator plugins.
      - name: Extensible Plugin Architecture
        description: >-
          AutoRest uses a pipeline-based plugin architecture where language
          generators, transformers, and validators are loaded as npm packages.
          Custom plugins can be developed to extend the generation pipeline.
      - name: OpenAPI Processing
        description: >-
          Supports OpenAPI 2.0 (Swagger) and OpenAPI 3.0 specification formats.
          The modelerfour plugin normalizes OpenAPI schemas into a consistent
          code model shared across all language generators.
      - name: Azure SDK Integration
        description: >-
          Tightly integrated with Microsoft Azure SDK generation for all Azure
          services, producing SDK packages published to npm, PyPI, Maven,
          NuGet, and Go Modules.
      - name: Configuration File Support
        description: >-
          Supports literate configuration using Markdown code blocks for
          per-client customization of generated output including namespace,
          output folder, and generator-specific options.
  - type: UseCases
    data:
      - name: Azure Service SDK Generation
        description: >-
          Primary use case for generating Azure SDK client libraries for all
          Azure services from the azure-rest-api-specs OpenAPI repository.
      - name: REST API Client Generation
        description: >-
          Generate strongly-typed client SDKs for any REST API described in
          OpenAPI format across multiple programming languages simultaneously.
      - name: SDK Customization
        description: >-
          Use AutoRest configuration files and directives to customize generated
          code including renames, suppressions, and additional properties.
  - type: Integrations
    data:
      - name: Azure REST API Specs
        description: >-
          AutoRest is the primary tool consuming the Azure/azure-rest-api-specs
          repository to generate official Azure SDK client libraries.
      - name: TypeSpec
        description: >-
          TypeSpec is the recommended successor to AutoRest for new API
          definitions, with AutoRest generators serving as code generation backends.
      - name: npm
        description: >-
          AutoRest and all language generator plugins are distributed as npm
          packages under the @autorest scope.
