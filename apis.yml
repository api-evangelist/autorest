apis:
  - aid: autorest:autorest-core
    name: AutoRest Core
    description: >-
      The AutoRest Core package (@autorest/core) is the central engine that
      orchestrates code generation from OpenAPI specifications. It handles input
      processing, configuration resolution, pipeline management, and plugin
      coordination. All language-specific generators are plugins that extend
      the core pipeline.
    humanURL: https://github.com/Azure/autorest
    tags:
      - Code Generation
      - OpenAPI
      - Plugin System
      - Pipeline
    properties:
      - type: Documentation
        url: https://github.com/Azure/autorest/blob/main/docs/readme.md
      - type: GettingStarted
        url: https://github.com/Azure/autorest/blob/main/docs/install/readme.md
      - type: GitHubRepository
        url: https://github.com/Azure/autorest
      - type: SDK
        url: https://www.npmjs.com/package/@autorest/core
        title: npm Package

  - aid: autorest:autorest-csharp
    name: AutoRest C# Generator
    description: >-
      The AutoRest C# generator (@autorest/csharp) produces .NET client
      libraries from OpenAPI specifications. It generates strongly-typed
      C# code with HttpClient-based REST clients, model classes, and
      async/await patterns compatible with .NET 6+.
    humanURL: https://github.com/Azure/autorest.csharp
    tags:
      - C#
      - .NET
      - Code Generation
      - Azure SDK
    properties:
      - type: Documentation
