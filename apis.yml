  - aid: autorest:autorest-python
    name: AutoRest Python Generator
    description: >-
      The AutoRest Python generator (@autorest/python) produces Python client
      libraries from OpenAPI specifications, generating typed Python code
      compatible with the Azure SDK for Python and azure-core library.
    humanURL: https://github.com/Azure/autorest.python
    tags:
