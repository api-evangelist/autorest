aid: autorest
name: AutoRest
description: >-
  AutoRest is an open source tool from Microsoft that generates client libraries
  for accessing RESTful APIs from OpenAPI specifications. It powers the
  generation of Azure SDKs across Python, Java, C#, TypeScript, Go, and other
  languages with extensible plugins and customization support.
